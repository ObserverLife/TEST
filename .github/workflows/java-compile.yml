# .github/workflows/java-compile.yml
name: Compile (input).java on Push

on:
  push:
    paths:
      - '**.java'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17' # 원하는 버전으로 조정 가능

    - name: Compile (input).java
      run: |
          find . -name "*.java" > sources.txt
          javac @sources.txt
          echo "Compiled the following files:"
          find . -name "*.class"
