# .github/workflows/simple-output.yml
name: Create Output File

on:
  push:
    branches: [ main ]  # 또는 원하시는 브랜치로 설정

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create output file
        run: |
          echo "Generated on: $(date)" > output.txt
          echo "This is a sample output file from GitHub Actions." >> output.txt
